name: CI

on:
  push:
    paths:
      - 'nestjs-go-export-excel-wasm/**'
      - '.github/workflows/nestjs-go-export-excel-wasm-ci.yml'
  pull_request:
    paths:
      - 'nestjs-go-export-excel-wasm/**'
      - '.github/workflows/nestjs-go-export-excel-wasm-ci.yml'

jobs:
  nestjs-go-export-excel-wasm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nestjs-go-export-excel-wasm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: nestjs-go-export-excel-wasm/excel-streamer/go.mod

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Build WASM bridge
        run: bun run build:wasm

      - name: Build Rust WASM bridge
        run: bun run build:rust-wasm

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Unit tests
        run: bun run test

      - name: E2E tests
        run: bun run test:e2e

      - name: Comparison validation
        run: |
          PORT=3100 bun dist/src/main.js &
          APP_PID=$!
          trap 'kill $APP_PID' EXIT
          for i in {1..30}; do
            curl -sf http://localhost:3100/export/exceljs/health >/dev/null && break
            sleep 1
          done
          BASE_URL=http://localhost:3100 bun run test:comparison
