name: CI

on:
  push:
    paths:
      - 'nestjs-go-export-excel-wasm/**'
      - '.github/workflows/nestjs-go-export-excel-wasm-ci.yml'
  pull_request:
    paths:
      - 'nestjs-go-export-excel-wasm/**'
      - '.github/workflows/nestjs-go-export-excel-wasm-ci.yml'

jobs:
  nestjs-go-export-excel-wasm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nestjs-go-export-excel-wasm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nestjs-go-export-excel-wasm/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: nestjs-go-export-excel-wasm/excel-streamer/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Build WASM bridge
        run: npm run build:wasm

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --runInBand

      - name: E2E tests
        run: npm run test:e2e -- --runInBand

      - name: Comparison validation
        run: |
          PORT=3100 node dist/src/main.js &
          APP_PID=$!
          trap 'kill $APP_PID' EXIT
          for i in {1..30}; do
            curl -sf http://localhost:3100/export/exceljs/health >/dev/null && break
            sleep 1
          done
          BASE_URL=http://localhost:3100 npm run test:comparison
