name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Build Nest app
        run: bun run build

  go-wasm:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: excel-streamer/go.mod

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Go WASM bridge
        run: bun run build:wasm

      - name: Upload Go WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-wasm-artifacts
          path: |
            excel-streamer/excel_bridge.wasm
            excel-streamer/wasm_exec.js

  rust-wasm:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Rust WASM bridge
        run: bun run build:rust-wasm

      - name: Smoke test Rust WASM bridge
        run: bun run test:rust-wasm

      - name: Upload Rust WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-wasm-artifacts
          path: |
            rust-excel-streamer/pkg

  unit-tests:
    runs-on: ubuntu-24.04
    needs:
      - lint-and-build
      - rust-wasm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Download Rust WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: rust-wasm-artifacts
          path: rust-excel-streamer/pkg

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Run unit tests
        run: bun run test

  e2e-tests:
    runs-on: ubuntu-24.04
    needs:
      - go-wasm
      - rust-wasm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Download Go WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: go-wasm-artifacts
          path: excel-streamer

      - name: Download Rust WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: rust-wasm-artifacts
          path: rust-excel-streamer/pkg

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Run e2e tests
        run: bun run test:e2e

      - name: Run comparison validation
        run: |
          PORT=3100 bun run dist/src/main.js &
          APP_PID=$!
          trap 'kill $APP_PID' EXIT
          for i in {1..30}; do
            curl -sf http://localhost:3100/export/exceljs/health >/dev/null && break
            sleep 1
          done
          BASE_URL=http://localhost:3100 bun run test:comparison
