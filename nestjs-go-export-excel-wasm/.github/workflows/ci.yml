name: CI

on:
  push:
    paths:
      - 'nestjs-go-export-excel-wasm/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'nestjs-go-export-excel-wasm/**'
      - '.github/workflows/ci.yml'

jobs:
  nestjs-go-export-excel-wasm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nestjs-go-export-excel-wasm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nestjs-go-export-excel-wasm/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --runInBand

      - name: E2E tests
        run: npm run test:e2e -- --runInBand
